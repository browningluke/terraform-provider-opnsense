name: Post-merge Tests (Tier 2)

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'examples/**'
      - 'scripts/**'
      - 'templates/**'
      - 'README.md'
      - '.github/**'

permissions:
  contents: read

jobs:
  test:
    uses: ./.github/workflows/terraform-test-reusable.yml
    with:
      packages: './...'
